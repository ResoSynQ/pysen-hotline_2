<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アンケート | kiiroPAISEN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f9f8f5;
    --white: #ffffff;
    --accent: #d4a017;
    --accent2: #e86a2a;
    --text: #1a1a1a;
    --text-dim: #888;
    --bubble-ai-bg: #ffffff;
    --bubble-user-bg: #fff8e8;
    --border: rgba(0,0,0,0.08);
    --shadow: 0 2px 16px rgba(0,0,0,0.07);
    --font: 'Zen Maru Gothic', 'Noto Sans JP', sans-serif;
    --radius: 20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #app {
    width: 100%;
    max-width: 520px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }

  /* ===== Header ===== */
  header {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 16px 10px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .header-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #4caf50;
    box-shadow: 0 0 6px #4caf50;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:.4; }
  }
  .header-title {
    font-size: .78rem; color: var(--text-dim);
    letter-spacing: .1em;
  }
  .turn-badge {
    margin-left: auto;
    font-size: .72rem; color: var(--text-dim);
    background: #f0f0f0;
    padding: 3px 10px; border-radius: 99px;
  }
  .turn-badge span { color: var(--accent); font-weight: 700; }

  /* ===== Character Area ===== */
  #character-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 0;
    background: var(--white);
  }

  .char-img-wrap {
    position: relative;
    width: 200px; height: 200px;
    flex-shrink: 0;
  }
  .char-img-wrap img {
    width: 100%; height: 100%;
    object-fit: contain;
    border-radius: 16px;
    transition: opacity .4s ease;
  }
  .char-img-wrap img.fade-out { opacity: 0; }
  .char-img-wrap img.fade-in  { opacity: 1; }

  /* 吹き出し */
  .speech-bubble {
    position: relative;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 14px 18px;
    margin: 12px 16px 0;
    font-size: .9rem;
    line-height: 1.7;
    color: var(--text);
    box-shadow: var(--shadow);
    min-height: 60px;
    transition: opacity .3s;
    width: calc(100% - 32px);
  }
  /* 吹き出しの三角（上向き） */
  .speech-bubble::before {
    content: '';
    position: absolute;
    top: -10px; left: 50%; transform: translateX(-50%);
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-bottom: 10px solid var(--border);
  }
  .speech-bubble::after {
    content: '';
    position: absolute;
    top: -8px; left: 50%; transform: translateX(-50%);
    border-left: 9px solid transparent;
    border-right: 9px solid transparent;
    border-bottom: 9px solid var(--white);
  }
  .speech-bubble.typing .bubble-text::after {
    content: '●●●';
    letter-spacing: 3px;
    animation: dot3 .9s ease-in-out infinite;
    font-size: .7rem;
    color: var(--text-dim);
  }
  @keyframes dot3 {
    0%,100% { opacity:.3; } 50% { opacity:1; }
  }

  /* スコアバッジは非表示（内部処理のみ） */
  #score-badge { display: none !important; }

  /* ===== Chat Window ===== */
  #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex; flex-direction: column; gap: 10px;
    scroll-behavior: smooth;
    background: var(--bg);
  }
  #chat-window::-webkit-scrollbar { width: 3px; }
  #chat-window::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

  /* ===== Message Bubbles ===== */
  .msg {
    display: flex; gap: 8px; align-items: flex-end;
    animation: msgIn .3s ease both;
  }
  @keyframes msgIn {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .msg.ai   { flex-direction: row; }
  .msg.user { flex-direction: row-reverse; }

  .msg-icon {
    width: 30px; height: 30px; border-radius: 50%;
    flex-shrink: 0; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    background: #f0f0f0;
    border: 1px solid var(--border);
  }
  .msg-icon img { width:100%; height:100%; object-fit:cover; }

  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: .86rem; line-height: 1.65;
  }
  .msg.ai .bubble {
    background: var(--bubble-ai-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: #1a1a1a;
    box-shadow: var(--shadow);
  }
  .msg.user .bubble {
    background: var(--bubble-user-bg);
    border: 1px solid rgba(212,160,23,.3);
    border-bottom-right-radius: 4px;
    color: #3a2a00;
  }

  /* ===== Input Area ===== */
  #input-area {
    padding: 10px 16px 16px;
    background: var(--white);
    border-top: 1px solid var(--border);
  }
  .input-row {
    display: flex; gap: 8px; align-items: flex-end;
  }
  #text-input {
    flex: 1;
    background: #f5f5f5;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: var(--font);
    font-size: .88rem;
    padding: 11px 15px;
    resize: none; outline: none;
    min-height: 44px; max-height: 110px;
    line-height: 1.5;
    transition: border-color .2s, box-shadow .2s;
  }
  #text-input:focus {
    border-color: var(--accent);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(212,160,23,.12);
  }
  #text-input::placeholder { color: #bbb; }
  #text-input:disabled { opacity:.4; cursor:not-allowed; }

  .btn {
    width: 44px; height: 44px; border-radius: 12px;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.15rem;
    transition: transform .15s, box-shadow .2s;
    flex-shrink: 0;
  }
  .btn:active { transform: scale(.92); }
  .btn:disabled { opacity:.3; cursor:not-allowed; transform:none !important; }

  #send-btn {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 10px rgba(212,160,23,.35);
  }
  #send-btn:hover:not(:disabled) {
    box-shadow: 0 2px 18px rgba(212,160,23,.55);
  }
  #mic-btn {
    background: #f0f0f0;
    border: 1px solid var(--border);
    color: #555;
  }
  #mic-btn.recording {
    background: rgba(255,60,60,.1);
    border-color: rgba(255,60,60,.4);
    color: #e53935;
    animation: micPulse 1s ease-in-out infinite;
  }
  @keyframes micPulse {
    0%,100% { box-shadow:0 0 0 0 rgba(255,60,60,.3); }
    50%      { box-shadow:0 0 0 7px rgba(255,60,60,0); }
  }
  .input-hint {
    text-align: center; font-size: .68rem;
    color: #ccc; margin-top: 7px;
  }

  /* ===== End Screen ===== */
  #end-screen {
    display: none;
    flex-direction: column; align-items: center;
    justify-content: center; text-align: center;
    gap: 16px; padding: 48px 24px;
    flex: 1;
    animation: fadeUp .8s ease both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(24px); }
    to   { opacity:1; transform:translateY(0); }
  }
  #end-screen.visible { display: flex; }
  #end-screen img {
    width: 240px; border-radius: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    display: block;
  }
  .end-title {
    font-size: 1.3rem; font-weight: 700;
    color: var(--accent);
  }
  .end-body {
    font-size: .88rem; color: var(--text-dim);
    line-height: 1.8;
  }

  /* ===== Toast ===== */
  #toast {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: #333; color: #fff;
    font-size: .78rem; padding: 9px 18px;
    border-radius: 10px; opacity: 0;
    transition: all .3s; pointer-events: none;
    z-index: 100; white-space: nowrap;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .char-img-wrap { width: 160px; height: 160px; }
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="header-dot"></div>
    <span class="header-title">アンケートセッション</span>
    <div class="turn-badge">ターン <span id="turn-num">0</span> / 10</div>
  </header>

  <!-- キャラクターエリア -->
  <div id="character-area">
    <div class="char-img-wrap">
      <img id="char-img" src="./Hello.png" alt="kiiroPAISEN"
           onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>'">
    </div>
    <div class="speech-bubble" id="speech-bubble">
      <div class="bubble-text" id="bubble-text">やあこんにちは！勉強会のアンケートをとっているんだ。あなたの意見を聞かせてください先日の勉強会率直に言ってどうだった？</div>
      <!-- スコアバッジは内部処理のみ（表示なし） -->
      <div id="score-badge" style="display:none">
        <span id="score-stars"></span>
        <span id="score-label"></span>
      </div>
    </div>
  </div>

  <!-- チャット履歴 -->
  <div id="chat-window"></div>

  <!-- 入力エリア -->
  <div id="input-area">
    <div class="input-row">
      <textarea id="text-input" placeholder="メッセージを入力..." rows="1"></textarea>
      <button class="btn" id="mic-btn" title="音声入力">🎤</button>
      <button class="btn" id="send-btn" title="送信" disabled>➤</button>
    </div>
    <div class="input-hint">Enterで送信 / Shift+Enterで改行</div>
  </div>

  <!-- 終了画面 -->
  <div id="end-screen">
    <div id="end-img-wrap">
      <img id="end-img" src="./Thankyou.png" alt="ありがとうございました"
           onerror="this.onerror=null;this.src='./thankyou.png';">
      <div id="end-fallback" style="display:none;font-size:5rem">🎉</div>
    </div>
    <div class="end-title">ありがとうございました！</div>
    <div class="end-body">
      アンケートへのご協力、誠にありがとうございます。<br>
      いただいたご意見を活かして、より良い勉強会を目指してまいります。<br>
      またお会いしましょう！
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
// ============================================================
//  ★★★ 設定 ★★★
// ============================================================
const CONFIG = {
  GAS_URL: "https://script.google.com/macros/s/AKfycbxEMuvHkGPJhzRVWwS7jWuS04vH-HycgLSe2s5c1Vya5a7X9G0N5fPolWaVAPUwBRuc/exec",
  MAX_TURNS: 10,
  OPENING_MESSAGE: "やあこんにちは！勉強会のアンケートをとっているんだ。あなたの意見を聞かせてください",
  CLOSING_MESSAGE: "ありがとう！アンケートはこれにて終了！主催者に変わり御礼申し上げます！勉強会に参加いただきまして誠にありがとうございました。アンケートを参考により良い運営を目指していきます！ご不明点があれば先のメールにて返信いただければと思います。また次回の勉強会でお会いしましょう！ではでは！",
};

// スコアと画像・ラベルのマッピング
const SCORE_MAP = {
  1: { img: "What.png",  stars: "★☆☆☆☆", label: "困惑・ネガティブ" },
  2: { img: "Why.png",   stars: "★★☆☆☆", label: "疑問・やや不満"   },
  3: { img: "Fum.png",   stars: "★★★☆☆", label: "普通・中立"       },
  4: { img: "Good.png",  stars: "★★★★☆", label: "良い・ポジティブ" },
  5: { img: "Nice.png",  stars: "★★★★★", label: "最高・とても良い" },
};
// ============================================================

// ===== State =====
let turnCount = 0;
let conversationHistory = []; // {role, content}
let scoreHistory = [];        // {turn, score, image}
let isProcessing = false;
let recognition = null;
let isRecording = false;
let currentScore = null;

// ===== DOM =====
const chatWindow   = document.getElementById("chat-window");
const textInput    = document.getElementById("text-input");
const sendBtn      = document.getElementById("send-btn");
const micBtn       = document.getElementById("mic-btn");
const turnNum      = document.getElementById("turn-num");
const charImg      = document.getElementById("char-img");
const bubbleText   = document.getElementById("bubble-text");
const speechBubble = document.getElementById("speech-bubble");
const scoreBadge   = document.getElementById("score-badge");
const scoreStars   = document.getElementById("score-stars");
const scoreLabel   = document.getElementById("score-label");
const inputArea    = document.getElementById("input-area");
const endScreen    = document.getElementById("end-screen");
const toast        = document.getElementById("toast");

// ===== Init =====
window.addEventListener("DOMContentLoaded", () => {
  setupInput();
  setupMic();
  sendBtn.disabled = true;
  setTimeout(() => {
    conversationHistory.push({ role: "model", content: CONFIG.OPENING_MESSAGE });
    speak(CONFIG.OPENING_MESSAGE);
    setInputEnabled(true);
  }, 600);
});

// ===== キャラクター画像を切り替え（フェード） =====
function changeCharImage(imgFile) {
  if (charImg.dataset.current === imgFile) return;
  charImg.dataset.current = imgFile;
  charImg.classList.add("fade-out");
  setTimeout(() => {
    charImg.src = "./" + imgFile;
    charImg.classList.remove("fade-out");
    charImg.classList.add("fade-in");
    setTimeout(() => charImg.classList.remove("fade-in"), 400);
  }, 300);
}

// ===== 吹き出しテキストを更新 =====
function updateSpeechBubble(text, score) {
  bubbleText.textContent = text;
  // スコアは内部処理のみ・画面には表示しない
  scoreBadge.style.display = "none";
}

// ===== タイピング中の吹き出し =====
function showBubbleTyping() {
  speechBubble.classList.add("typing");
  bubbleText.textContent = "";
  scoreBadge.style.display = "none";
}
function hideBubbleTyping() {
  speechBubble.classList.remove("typing");
}

// ===== ユーザー送信 =====
async function sendMessage() {
  const text = textInput.value.trim();
  if (!text || isProcessing) return;

  // ユーザーが入力した瞬間に音声停止
  stopSpeech();

  textInput.value = "";
  autoResizeTextarea();
  sendBtn.disabled = true;
  isProcessing = true;
  setInputEnabled(false);

  turnCount++;
  turnNum.textContent = turnCount;

  conversationHistory.push({ role: "user", content: text });
  appendMessage("user", text);

  // 10ターン到達 → 即終了画面へ
  if (turnCount >= CONFIG.MAX_TURNS) {
    finalizeSession();
    return;
  }

  // 吹き出しをタイピング中に
  showBubbleTyping();

  try {
    const res = await callGAS({
      action: "chat",
      history: conversationHistory,
      turn: turnCount,
    });

    hideBubbleTyping();
    const reply = res.reply || "（返答の取得に失敗しました）";
    const score = res.score || null;
    const imgFile = res.image || "Hello.png";

    // スコア履歴に記録
    if (score) scoreHistory.push({ turn: turnCount, score, image: imgFile });

    // 画像切り替え
    changeCharImage(imgFile);

    // 吹き出し更新
    updateSpeechBubble(reply, score);

    // チャット履歴にも追加
    conversationHistory.push({ role: "model", content: reply });
    appendMessage("ai", reply);

    // 音声読み上げ
    speak(reply);

    setInputEnabled(true);
    isProcessing = false;

  } catch (err) {
    hideBubbleTyping();
    showToast("通信エラーが発生しました。再試行してください。");
    console.error(err);
    setInputEnabled(true);
    isProcessing = false;
    turnCount--;
    turnNum.textContent = turnCount;
    conversationHistory.pop();
  }
}

// ===== Finalize =====
async function finalizeSession() {
  stopSpeech();
  // 即終了画面表示
  showEndScreen();
  // バックグラウンドでGASに送信
  try {
    await callGAS({
      action: "finalize",
      history: conversationHistory,
      scoreHistory: scoreHistory,
    });
  } catch (e) {
    console.warn("finalize error:", e);
  }
}

// ===== GAS Call =====
async function callGAS(payload) {
  const res = await fetch(CONFIG.GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(payload),
    redirect: "follow",
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.json();
}

// ===== DOM Helpers =====
function appendMessage(role, text) {
  const div = document.createElement("div");
  div.className = `msg ${role}`;

  const icon = document.createElement("div");
  icon.className = "msg-icon";
  if (role === "ai") {
    const img = document.createElement("img");
    img.src = charImg.src;
    img.onerror = () => { icon.textContent = "🤖"; };
    icon.appendChild(img);
  } else {
    icon.textContent = "😊";
  }

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;

  div.appendChild(icon);
  div.appendChild(bubble);
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function setInputEnabled(enabled) {
  textInput.disabled = !enabled;
  micBtn.disabled    = !enabled;
  sendBtn.disabled   = enabled ? !textInput.value.trim() : true;
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 3500);
}

function showEndScreen() {
  inputArea.style.display    = "none";
  chatWindow.style.display   = "none";
  document.getElementById("character-area").style.display = "none";
  endScreen.classList.add("visible");
  // 画像フォールバック：両方試してダメなら絵文字
  const endImg = document.getElementById("end-img");
  if (endImg) {
    endImg.onerror = function() {
      this.style.display = "none";
      document.getElementById("end-fallback").style.display = "block";
    };
  }
}

// ===== Input Setup =====
function setupInput() {
  textInput.addEventListener("input", () => {
    autoResizeTextarea();
    sendBtn.disabled = !textInput.value.trim() || isProcessing;
    // 入力開始で音声停止
    stopSpeech();
  });
  textInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  });
  sendBtn.addEventListener("click", sendMessage);
}

function autoResizeTextarea() {
  textInput.style.height = "auto";
  textInput.style.height = Math.min(textInput.scrollHeight, 110) + "px";
}

// ===== TTS =====
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang  = "ja-JP";
  utter.rate  = 1.05;
  utter.pitch = 1.1;
  const voices = window.speechSynthesis.getVoices();
  const jaVoice = voices.find(v => v.lang.startsWith("ja"));
  if (jaVoice) utter.voice = jaVoice;
  window.speechSynthesis.speak(utter);
}

function stopSpeech() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
}

// ===== STT =====
function setupMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { micBtn.disabled = true; micBtn.title = "このブラウザは音声認識非対応"; return; }
  recognition = new SR();
  recognition.lang = "ja-JP";
  recognition.interimResults = true;
  recognition.continuous = false;

  recognition.onresult = (e) => {
    let interim = "", final = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    textInput.value = final || interim;
    autoResizeTextarea();
    sendBtn.disabled = !textInput.value.trim();
  };
  recognition.onend = () => {
    isRecording = false;
    micBtn.classList.remove("recording");
  };
  recognition.onerror = (e) => {
    isRecording = false;
    micBtn.classList.remove("recording");
    if (e.error !== "aborted") showToast("音声認識エラー: " + e.error);
  };
  micBtn.addEventListener("click", () => {
    if (isRecording) {
      recognition.stop();
    } else {
      stopSpeech();
      try {
        recognition.start();
        isRecording = true;
        micBtn.classList.add("recording");
      } catch(e) { showToast("マイク起動失敗"); }
    }
  });
}

if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
</script>
</body>
</html>
